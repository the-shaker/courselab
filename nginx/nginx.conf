worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    sendfile   on;
    gzip       on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    keepalive_timeout 65;

    server {
        listen 80;
        server_name app.nikitos.pro;
        return 301 https://$host$request_uri;
    }

    server {
        listen 80;
        server_name api.nikitos.pro;
        return 301 https://$host$request_uri;
    }

    server {
        listen 80;
        server_name nikitos.pro;
        return 301 https://app.nikitos.pro$request_uri;
    }

    server {
        listen 443 ssl;
        server_name nikitos.pro;

        ssl_certificate     /etc/letsencrypt/live/nikitos.pro/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nikitos.pro/privkey.pem;

        return 301 https://app.nikitos.pro$request_uri;
    }

    server {
        listen 443 ssl;
        server_name app.nikitos.pro;

        ssl_certificate     /etc/letsencrypt/live/nikitos.pro/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nikitos.pro/privkey.pem;

        root  /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    server {
        listen 443 ssl;
        server_name api.nikitos.pro;

        ssl_certificate     /etc/letsencrypt/live/nikitos.pro/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nikitos.pro/privkey.pem;

        location / {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
